# @package _global_
#
# Omni-mode R2R evaluation config.
#
# Reference: configs/vln_r2r.yaml (single front RGB camera).
#
# This config adds two extra RGB cameras — `rgb_left` (+90 deg yaw) and
# `rgb_right` (-90 deg yaw) — so the Omni evaluator can fill the
# leftside / frontside / rightside prompt slots with the REAL current-step
# views, exactly like OmniNav's `add_frame([left, right, front])` in
# referenceomni/OmniNav/infer_r2r_rxr/agent/waypoint_agent.py.
#
# IMPORTANT: only use this config to evaluate a checkpoint that was ALSO trained
# with real 3-camera (left/front/right) current observations. The default
# JD-VLN training data is front-only (the generator replicates the front view),
# so for a front-only checkpoint use configs/vln_r2r.yaml instead (or set
# OMNI_USE_PANORAMA=False), which keeps train/eval consistent. The Omni
# evaluator auto-falls back to front-replication when these sensors are absent.
#
# The left/right yaw is intentionally a literal +/-90 deg ("leftside"/"rightside").
# Adjust the `orientation` yaw below (radians, rotation about +Y) if your training
# rig used a different side-camera angle.

defaults:
  - /habitat: habitat_config_base
  - /habitat/task: vln_r2r
  - /habitat/simulator/agents@habitat.simulator.agents.main_agent: rgbd_agent
  - /habitat/simulator/sim_sensors@habitat.simulator.agents.main_agent.sim_sensors.rgb_left_sensor: rgb_left_sensor
  - /habitat/simulator/sim_sensors@habitat.simulator.agents.main_agent.sim_sensors.rgb_right_sensor: rgb_right_sensor
  - /habitat/dataset/vln: mp3d_r2r
  - /habitat/task/lab_sensors:
    - gps_sensor
    - compass_sensor
  - _self_

habitat:
  environment:
    max_episode_steps: 300
    iterator_options:
      max_scene_repeat_steps: 50000
      shuffle: False
  simulator:
    agents:
      main_agent:
        sim_sensors:
          rgb_sensor:
            width: 640
            height: 480
            hfov: 79
          rgb_left_sensor:   # uuid "rgb_left" (set by the registered node); +90 deg yaw -> faces left
            width: 640
            height: 480
            hfov: 79
            orientation: [0.0, 1.5707963267948966, 0.0]
          rgb_right_sensor:  # uuid "rgb_right" (set by the registered node); -90 deg yaw -> faces right
            width: 640
            height: 480
            hfov: 79
            orientation: [0.0, -1.5707963267948966, 0.0]
          depth_sensor:
            width: 640
            height: 480
            hfov: 79
            min_depth: 0.0
            max_depth: 10.0
    forward_step_size: 0.25
    turn_angle: 15
    tilt_angle: 15
    action_space_config: "v1"
    habitat_sim_v0:
      gpu_device_id: -1
  task:
    measurements:
      distance_to_goal:
        type: DistanceToGoal
        distance_to: POINT
      success:
        type: Success
        success_distance: 3.0
      spl:
        type: SPL
      oracle_success:
        type: OracleSuccess
      oracle_navigation_error:
        type: OracleNavigationError
    actions:
      stop:
        type: StopAction
        agent_index: 0
      move_forward:
        type: MoveForwardAction
        agent_index: 0
      turn_left:
        type: TurnLeftAction
        agent_index: 0
      turn_right:
        type: TurnRightAction
        agent_index: 0
      look_up:
        type: LookUpAction
        agent_index: 0
      look_down:
        type: LookDownAction
        agent_index: 0

  dataset:
    type: R2RVLN-v1
    split: val_unseen
    scenes_dir: /mnt/nas5/xiangchen/data/scene_datasets/
    data_path: /mnt/nas5/xiangchen/vlacode/R2R_VLNCE_v1-3_preprocessed/{split}/{split}.json.gz
